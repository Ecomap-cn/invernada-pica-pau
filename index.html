        <script>
        (function(){
          // ===== EcoMap Auth (simples) =====
          var USER_OK = "picapau2026";
          var PASS_OK = "picapau2026";
          var KEY_SESSION = "ecomap_auth_ok_date";
          var KEY_REMEMBER = "ecomap_remember";
          var KEY_USER = "ecomap_user";
          var KEY_PASS = "ecomap_pass";

          function todayKey(){
            var d = new Date();
            return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
          }

          function isAuthedToday(){
            try{
              return sessionStorage.getItem(KEY_SESSION) === todayKey();
            }catch(e){ return false; }
          }

          function lock(){
            document.body.classList.add("ecomap-locked");
            var ov = document.getElementById("ecomapLoginOverlay");
            if(ov) ov.style.display = "flex";
            window.ECOMAP_SKIP_INIT = true;
          }

          function unlock(){
            document.body.classList.remove("ecomap-locked");
            var ov = document.getElementById("ecomapLoginOverlay");
            if(ov) ov.style.display = "none";
            window.ECOMAP_SKIP_INIT = false;
          }

          function scheduleAutoLogout(){
            // Logoff às 23:59:59 (hora local)
            var now = new Date();
            var end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
            var ms = end.getTime() - now.getTime();
            if(ms <= 0){
              doLogout();
              return;
            }
            window.__ecomapLogoutTimer && clearTimeout(window.__ecomapLogoutTimer);
            window.__ecomapLogoutTimer = setTimeout(doLogout, ms);
          }

          function doLogout(){
            try{ sessionStorage.removeItem(KEY_SESSION); }catch(e){}
            try{ location.reload(); }catch(e){ lock(); }
          }

          function applyRemembered(){
            var cb = document.getElementById("ecomapRemember");
            var u = document.getElementById("ecomapUser");
            var p = document.getElementById("ecomapPass");
            if(!cb || !u || !p) return;
            try{
              var remember = localStorage.getItem(KEY_REMEMBER) === "1";
              cb.checked = remember;
              if(remember){
                u.value = localStorage.getItem(KEY_USER) || "";
                p.value = localStorage.getItem(KEY_PASS) || "";
              }
            }catch(e){}
          }

          function storeRemembered(){
            var cb = document.getElementById("ecomapRemember");
            var u = document.getElementById("ecomapUser");
            var p = document.getElementById("ecomapPass");
            if(!cb || !u || !p) return;
            try{
              if(cb.checked){
                localStorage.setItem(KEY_REMEMBER, "1");
                localStorage.setItem(KEY_USER, u.value || "");
                localStorage.setItem(KEY_PASS, p.value || "");
              }else{
                localStorage.setItem(KEY_REMEMBER, "0");
                localStorage.removeItem(KEY_USER);
                localStorage.removeItem(KEY_PASS);
              }
            }catch(e){}
          }

          function showError(show){
            var el = document.getElementById("ecomapLoginError");
            if(el) el.style.display = show ? "block" : "none";
          }

          function tryLogin(){
            var u = (document.getElementById("ecomapUser")||{}).value || "";
            var p = (document.getElementById("ecomapPass")||{}).value || "";
            if(u === USER_OK && p === PASS_OK){
              showError(false);
              storeRemembered();
              try{ sessionStorage.setItem(KEY_SESSION, todayKey()); }catch(e){}
              // recarrega para permitir inicialização do mapa
              location.reload();
            }else{
              showError(true);
            }
          }

          function bindUI(){
            var btn = document.getElementById("ecomapLoginBtn");
            var u = document.getElementById("ecomapUser");
            var p = document.getElementById("ecomapPass");
            var eye = document.getElementById("ecomapTogglePwd");

            if(btn) btn.addEventListener("click", tryLogin);
            if(u) u.addEventListener("keydown", function(e){ if(e.key==="Enter") tryLogin(); });
            if(p) p.addEventListener("keydown", function(e){ if(e.key==="Enter") tryLogin(); });

            if(eye){
              eye.addEventListener("click", function(){
                var ip = document.getElementById("ecomapPass");
                if(!ip) return;
                ip.type = (ip.type === "password") ? "text" : "password";
              });
            }

            applyRemembered();
          }

          // decide lock/unlock antes do mapa iniciar
          if(isAuthedToday()){
            unlock();
            scheduleAutoLogout();
          }else{
            lock();
          }

          if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", bindUI);
          else bindUI();

          // opcional: expor logout para futuro botão, se quiser
          window.EcoMapLogout = doLogout;
        })();
        </script>

        // Fórmula esférica (variação Chamberlain & Duquette), usada em diversas ferramentas Leaflet.
        function geodesicArea(latLngs){
            var points = latLngs;
            if(!points || points.length < 3) return 0;

            var radius = 6378137; // WGS84 (m)
            var area = 0;

            for (var i = 0, len = points.length; i < len; i++) {
                var p1 = points[i];
                var p2 = points[(i + 1) % len];

                var lon1 = p1.lng * Math.PI / 180;
                var lon2 = p2.lng * Math.PI / 180;
                var lat1 = p1.lat * Math.PI / 180;
                var lat2 = p2.lat * Math.PI / 180;

                area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
            }

            area = area * radius * radius / 2.0;
            return Math.abs(area);
        }

function disableAllVectorPopups(){

            if(typeof l.unbindPopup === 'function') l.unbindPopup();
            // remove handler de click (qgis2web usa click para abrir popup)
            if(typeof l.off === 'function'){
                try{ l.off('click'); }catch(e){}
                try{ l.off('popupopen'); }catch(e){}
            }
        }catch(e){}
    }

    try{
        map.eachLayer(function(lyr){
            killPopupOnLayer(lyr);

            // sublayers (geojson/feature groups)
            if(lyr && typeof lyr.eachLayer === 'function'){
                try{
                    lyr.eachLayer(function(sl){
                        killPopupOnLayer(sl);
                        // alguns geojson tem sub-sub-layers
                        if(sl && typeof sl.eachLayer === 'function'){
                            try{ sl.eachLayer(killPopupOnLayer); }catch(e){}
                        }
                    });
                }catch(e){}
            }
        });
    }catch(e){}
}

function fmtMeters(m){
  if (!isFinite(m)) return '-';
  return (m >= 1000) ? (m/1000).toFixed(2).replace('.',',') + ' km' : m.toFixed(2).replace('.',',') + ' m';
}
function fmtArea(a){
  if (!isFinite(a)) return '-';
  return (a/10000).toFixed(4).replace('.',',') + ' ha';
}
function lineLength(latlngs){
  var sum = 0;
  for (var i=1;i<latlngs.length;i++){ sum += map.distance(latlngs[i-1], latlngs[i]); }
  return sum;
}
function polygonPerimeter(latlngs){
  if (latlngs.length < 2) return 0;
  var sum = lineLength(latlngs);
  sum += map.distance(latlngs[latlngs.length-1], latlngs[0]);
  return sum;
}
function polygonArea(latlngs){
  try {
    if (L.GeometryUtil && typeof L.GeometryUtil.geodesicArea === 'function'){
      return Math.abs(L.GeometryUtil.geodesicArea(latlngs));
    }
  } catch(e) {}
  return NaN;
}

function toDMS(deg, isLat){
  // Converte graus decimais para DMS, sem casas decimais nos segundos
  var hemi = isLat ? (deg < 0 ? 'S' : 'N') : (deg < 0 ? 'W' : 'E');
  var abs = Math.abs(deg);
  var d = Math.floor(abs);
  var minFloat = (abs - d) * 60;
  var m = Math.floor(minFloat);
  var secFloat = (minFloat - m) * 60;
  var s = Math.round(secFloat);

  // normaliza arredondamentos (ex.: 59.9 -> 60)
  if(s === 60){ s = 0; m += 1; }
  if(m === 60){ m = 0; d += 1; }

  return d + '°' + String(m).padStart(2,'0') + "'" + String(s).padStart(2,'0') + '"' + hemi;
}


function refreshNotesTable(){
  var panel = document.getElementById('ecomapNotesTablePanel');
  var wrap = document.getElementById('ecomapNotesTableWrap');
  if (!panel || !wrap) return;

  
  var tableBtn = window._ecomapNotesTableBtn || null;
  if (tableBtn){ tableBtn.style.display = 'none'; }
// se as ferramentas de anotação estiverem recolhidas, a tabela deve ficar oculta
  if (!notesToolsOpen){
    panel.style.display = 'none';
    return;
  }

  var rows = [];
  notesLayer.eachLayer(function(l){
    var type = (l instanceof L.Marker) ? 'Ponto' : (l instanceof L.Polygon && !(l instanceof L.Rectangle) ? 'Polígono' : (l instanceof L.Polyline ? 'Linha' : 'Feição'));
    var name = (l.feature && l.feature.properties && (l.feature.properties.note || l.feature.properties.name)) ? (l.feature.properties.note || l.feature.properties.name) : '(sem nome)';
    var metric = '-';
    if (l instanceof L.Marker){
      var pt = l.getLatLng ? l.getLatLng() : null;
      if(pt){
        metric = 'Lat: ' + toDMS(pt.lat, true) + ' | Lon: ' + toDMS(pt.lng, false);
      }
    }
    if (l instanceof L.Polyline && !(l instanceof L.Polygon)){
      var ll = l.getLatLngs();
      metric = fmtMeters(lineLength(ll));
    } else if (l instanceof L.Polygon){
      var ring = l.getLatLngs();
      ring = Array.isArray(ring) && Array.isArray(ring[0]) ? ring[0] : ring;
      var a = polygonArea(ring);
      var p = polygonPerimeter(ring);
      metric = fmtArea(a) + ' | ' + fmtMeters(p);
    }
    rows.push({name:name, type:type, metric:metric});
  });

  if (rows.length === 0){
    panel.style.display = 'none';
    wrap.innerHTML = '';
    if (tableBtn){ tableBtn.style.display = 'none'; }
    return;
  }

  // há feições: habilita botão da tabela (no mobile)
  if (tableBtn){ tableBtn.style.display = ''; }

  // respeitar o estado recolhida/aberta (desktop + mobile)
  if (!notesTableVisible){
    panel.style.display = 'none';
    return;
  }

  var html = '<table><thead><tr><th>Nome</th><th>Tipo</th><th>Medições</th></tr></thead><tbody>';
  rows.forEach(function(r){
    html += '<tr><td>'+String(r.name).replace(/</g,'&lt;')+'</td><td>'+r.type+'</td><td>'+r.metric+'</td></tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  panel.style.display = 'block';
}

function setNotesLayerInteractive(layer, interactive){
  try{
    layer.options = layer.options || {};
    layer.options.interactive = !!interactive;
    if (layer._path){
      if (interactive){
        L.DomUtil.addClass(layer._path, 'leaflet-interactive');
        try{ layer._path.style.pointerEvents = 'auto'; }catch(e){}
      } else {
        L.DomUtil.removeClass(layer._path, 'leaflet-interactive');
        try{ layer._path.style.pointerEvents = 'none'; }catch(e){}
      }
    }
  }catch(e){}
}


function nowISO(){
    try{ return new Date().toISOString(); }catch(e){ return ''; }
}

  function bindNoteInteractions(layer){
    // Tooltip (nome/observação)
    try {
      var p = layer && layer.feature && layer.feature.properties ? layer.feature.properties : null;
      var note = p && (p.note || p.name) ? (p.note || p.name) : '';
      if (note && layer.bindTooltip){
        layer.bindTooltip(String(note), {sticky:true, direction:'top', opacity:0.9});
      }
    } catch(e) {}

    layer.on('click', function(e){
      // durante desenho/edição não capturar cliques
      if (notesDrawActive || notesEditActive) return;
      // editar nome/observação
      var current = (layer.feature && layer.feature.properties && (layer.feature.properties.note || layer.feature.properties.name)) || '';
      var val = prompt('Nome/Observação da feição:', current);
      if (val === null) return;
      layer.feature = layer.feature || {type:'Feature', properties:{}};
      layer.feature.properties = layer.feature.properties || {};
      layer.feature.properties.note = val;
      try { if (layer.setTooltipContent) layer.setTooltipContent(String(val)); } catch(e) {}
      refreshNotesTable();
    });
  }

function ensureFeatureMeta(layer){
    if(!layer.feature) layer.feature = { type:'Feature', properties:{} };
    if(!layer.feature.properties) layer.feature.properties = {};
    if(!layer.feature.properties.created_at) layer.feature.properties.created_at = nowISO();
    if(!layer.feature.properties.updated_at) layer.feature.properties.updated_at = nowISO();
}

var _ecomapFinishBarEl = null;
var _ecomapPrevDblZoomEnabled = null;
var _ecomapDblBlocker = function(e){ try{ L.DomEvent.stop(e); }catch(err){} };

function showFinishBar(show){
  try{
    if(!_ecomapFinishBarEl) _ecomapFinishBarEl = document.getElementById('ecomapFinishBar');
    if(!_ecomapFinishBarEl) return;
    _ecomapFinishBarEl.style.display = show ? 'flex' : 'none';
    _ecomapFinishBarEl.setAttribute('aria-hidden', show ? 'false' : 'true');
  }catch(e){}
}

function _ecomapGetActiveDrawHandler(){
  try{
    if(notesMode === 'polyline' && drawPolyline && drawPolyline.enabled && drawPolyline.enabled()) return drawPolyline;
    if(notesMode === 'polygon' && drawPolygon && drawPolygon.enabled && drawPolygon.enabled()) return drawPolygon;
  }catch(e){}
  return null;
}

(function(){
  // força Leaflet.draw a não finalizar por duplo-clique
  try{ if(drawPolyline && drawPolyline.options) drawPolyline.options.finishOnDoubleClick = false; }catch(e){}
  try{ if(drawPolygon && drawPolygon.options) drawPolygon.options.finishOnDoubleClick = false; }catch(e){}

  function gateFinish(handler){
    if(!handler || handler.__ecomapFinishGated) return;
    handler.__ecomapFinishGated = true;
    var origFinish = handler._finishShape;
    if(typeof origFinish !== 'function') return;

    handler._finishShape = function(){
      if(!this._ecomapAllowFinish){
        return; // bloqueia qualquer finalização por gesto/clique
      }
      return origFinish.apply(this, arguments);
    };
  }

  gateFinish(drawPolyline);
  gateFinish(drawPolygon);

  function bindButtons(){
    var btnFinish = document.getElementById('ecomapBtnFinish');
    var btnCancel = document.getElementById('ecomapBtnCancel');
    if(!btnFinish || !btnCancel) return;

    btnFinish.addEventListener('click', function(){
      var h = _ecomapGetActiveDrawHandler();
      if(!h) return;
      try{
        h._ecomapAllowFinish = true;
        if(typeof h._finishShape === 'function') h._finishShape();
      }catch(e){}
      try{ h._ecomapAllowFinish = false; }catch(e){}
    });

    btnCancel.addEventListener('click', function(){
      var h = _ecomapGetActiveDrawHandler();
      try{ if(h) h.disable(); }catch(e){}
      try{ stopAllNoteModes && stopAllNoteModes(); }catch(e){}
      showFinishBar(false);
    });
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bindButtons);
  else bindButtons();
})();

var editToolbar = new L.EditToolbar.Edit(map, { featureGroup: notesLayer });
var notesMode = null; // 'marker' | 'polyline' | 'polygon' | 'edit' | null

function stopAllNoteModes(){
    try{ drawMarker.disable(); }catch(e){}
    try{ drawPolyline.disable(); }catch(e){}
    try{ drawPolygon.disable(); }catch(e){}
    try{ editToolbar.disable(); }catch(e){}

    notesMode = null;

    // estado visual
    if(notesBtns && notesBtns.length){
        notesBtns.forEach(function(b){ b.classList.remove('is-active'); });
    }

    // garante que cliques voltem a funcionar ao sair de qualquer modo
    try{ setNotesInteractivity(true); }catch(e){}
    try{ setNotesPanePointerEvents(true); }catch(e){}
}

function setNotesMode(mode){
    // se estiver medindo, desliga a trena para não conflitar com cliques
    try{ if(typeof setMeasure === 'function' && measureActive) setMeasure(false); }catch(e){}

    stopAllNoteModes();
    notesMode = mode;

    if(mode === 'marker'){ try{ drawMarker.enable(); }catch(e){} }
    else if(mode === 'polyline'){ try{ drawPolyline.enable(); }catch(e){} }
    else if(mode === 'polygon'){ try{ drawPolygon.enable(); }catch(e){} }
    else if(mode === 'edit'){ try{ editToolbar.enable(); }catch(e){} }

    // dica
    try{
        if(mode === 'marker') showHint('<b>Anotações</b><br>• Clique para inserir um ponto<br>• Clique no ponto para escrever/editar observação<br>• Exportar para enviar à EcoMap');
        else if(mode === 'polyline') showHint('<b>Anotações</b><br>• Clique para criar a linha<br>• Duplo-clique para finalizar<br>• Clique na feição para escrever/editar observação');
        else if(mode === 'polygon') showHint('<b>Anotações</b><br>• Clique para criar o polígono<br>• Duplo-clique para finalizar<br>• Clique na feição para escrever/editar observação');
        else if(mode === 'edit') showHint('<b>Anotações</b><br>• Arraste vértices para editar<br>• Clique em “Salvar” na barra do editor quando terminar');
else hideHint();
    }catch(e){}

    // estado visual
    if(notesBtnsByMode && notesBtnsByMode[mode]){
        notesBtnsByMode[mode].classList.add('is-active');
    }
}

// eventos Leaflet.draw
  map.on('draw:drawstart', function(){
    notesDrawActive = true;
    // durante desenho, deixar cliques passarem através das feições existentes
    setNotesInteractivity(false);
    setNotesPanePointerEvents(false);

    // EcoMap: durante desenho (linha/polígono), bloquear duplo-clique e mostrar barra Finalizar/Cancelar (desktop+mobile)
    try{
      _ecomapPrevDblZoomEnabled = map.doubleClickZoom && map.doubleClickZoom._enabled;
      if(map.doubleClickZoom) map.doubleClickZoom.disable();
    }catch(e){}
    try{ map.on('dblclick', _ecomapDblBlocker); }catch(e){}
    try{ showFinishBar(notesMode === 'polyline' || notesMode === 'polygon'); }catch(e){}
  });
  map.on('draw:drawstop', function(){
    notesDrawActive = false;
    setNotesInteractivity(true);
    setNotesPanePointerEvents(true);

    try{ map.off('dblclick', _ecomapDblBlocker); }catch(e){}
    try{ if(_ecomapPrevDblZoomEnabled) map.doubleClickZoom.enable(); }catch(e){}
    try{ showFinishBar(false); }catch(e){}
  });
map.on(L.Draw.Event.CREATED, function (e) {
    try{
        var layer = e.layer;

        // metadados
        ensureFeatureMeta(layer);

        // pergunta observação
        var txt = prompt('Observação:', '');
        if(txt !== null){
            layer.feature.properties.note = String(txt || '').trim();
        }else{
            layer.feature.properties.note = '';
        }
        layer.feature.properties.updated_at = nowISO();

        // estilo extra para marker
        if(e.layerType === 'marker'){
            // nada especial; o default marker ok
        }else{
            try{ layer.setStyle && layer.setStyle(notesShapeOptions); }catch(err){}
        }

        setNotesLayerInteractive(layer, true);

        notesLayer.addLayer(layer);
    refreshNotesTable();
        bindNoteInteractions(layer);
    }catch(err){}
});

map.on('draw:edited', function (e) {
    try{
        e.layers.eachLayer(function(layer){
            ensureFeatureMeta(layer);
            layer.feature.properties.updated_at = nowISO();
            bindNoteInteractions(layer);
        });
    }catch(err){}
});

// ===== Exportação GeoJSON =====
function downloadTextFile(filename, textContent){
    var blob = new Blob([textContent], {type: 'application/geo+json;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 800);
}

function exportNotesGeoJSON(){
    try{
        if(!notesLayer || notesLayer.getLayers().length === 0){
            alert('Não há anotações para exportar.');
            return;
        }
        var gj = notesLayer.toGeoJSON();
        // garantia: incluir CRS não é padrão no GeoJSON moderno, então omitimos.
        var txt = JSON.stringify(gj, null, 2);
        var fname = 'anotacoes_santa_lucia_' + (new Date().toISOString().slice(0,10)) + '.geojson';
        downloadTextFile(fname, txt);
    }catch(e){
        alert('Falha ao exportar anotações.');
    }
}
